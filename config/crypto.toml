[venue]
name = "crypto"
benchmark = "BTC"  # fetched through the crypto adapter as BTC/USD on Kraken

[costs]
taker_fee_bps = 95.0   # 0.95% taker at <$10K 30-day volume (spec, June 2026 schedule)
maker_fee_bps = 50.0   # 0.50% maker
slippage_bps = 5.0
settlement_days = 0
trades_24_7 = true

[universe]
min_dollar_volume = 0.0  # no dollar-volume floor for crypto in v1

[signals]
momentum_windows = [7, 30, 90]  # calendar days (spec)
calendar_days = true
vol_window = 20
volume_week = 7                 # "current week" = 7 calendar days
volume_baseline = 90            # trailing 3 months = 90 calendar days
breakout_windows = [20, 60]
rsi_window = 14
mean_window = 20
raw_return_days = 30

[regime]
sma_fast = 50
sma_slow = 200
vol_window = 20
vol_lookback = 252
vol_high_percentile = 0.80
exposure_risk_on = 1.0
exposure_neutral = 0.5
exposure_risk_off = 0.0

[portfolio]  # consumed by the M2 simulator
max_positions = 3
position_size_pct = 0.30
starting_balance = 1000.0
time_stop_bars = 30                 # 30 calendar days = 30 daily bars (24/7 venue)
stop_atr_multiple = 1.5
regime_flush_atr_multiple = 1.0
cooldown_days = 7
max_daily_deployment_pct = 0.35     # must exceed position_size_pct (0.30) or entries deadlock;
                                    # still allows only ONE new crypto position per day
drawdown_halt_pct = 0.20
entry_score_threshold = 0.70
min_raw_return_cost_multiple = 3.0  # raw 30d return must exceed 3x round-trip cost (spec)
earnings_blackout_sessions = 0      # no earnings in crypto
staleness_hours = 6
atr_window = 20                     # ATR-20 (spec); frozen at entry

[data]
cache_dir = "data/crypto"
refetch_days = 30
min_coverage = 0.90
max_daily_move = 0.60          # mid-cap crypto legitimately has 40-60% days
history_days = 500
# Outlier scan only looks at the trailing N calendar days of each symbol's
# own history, anchored to its last bar. Window ~= refetch_days: the point
# is recent-data sanity (bad prints in the live-refetched tail), not
# history-wide policing of moves that happened many months ago.
quarantine_window_days = 40
# Kraken serves the current UTC day's candle while it's still in progress.
# A day-D candle only completes at D+1, so drop any bar dated as_of or
# later before computing signals -- decisions use data through the last
# completed bar only (spec).
drop_incomplete_last_bar = true
